<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chance It?</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="dynamic-title"></div>

  <div class="spinner-wrapper">
    <div class="spinner-container">
      <div class="spinner-marker"></div>
      <div class="spinner" id="spinner"></div>
    </div>
  </div>

  <button id="spin-btn" onclick="spinWheel()">Chance it!</button>

  <div id="result-card">
    <div class="result-label">You got</div>
    <div id="result-name"></div>
    <div id="preview-status"></div>
  </div>

  <div class="add-artist-section">
    <span class="section-label">Add for this session</span>
    <div class="add-artist-row">
      <div class="add-artist-inputs">
        <input id="add-label" type="text" placeholder="Label (shown in spinner)" onkeydown="handleAddKey(event)">
        <input id="add-search" type="text" placeholder="Song to preview (e.g. Radiohead Creep)" onkeydown="handleAddKey(event)">
      </div>
      <button id="add-btn" onclick="addArtist()">+</button>
    </div>
    <div id="add-confirmation"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
